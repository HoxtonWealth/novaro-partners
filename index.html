<title>Novaro Partners — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --np-green: #1a4a3a;
    --np-green-dark: #0f2e24;
    --np-green-light: #2a6b55;
    --np-cream: #f3efe8;
    --np-white: #ffffff;
    --np-text: #2c2c2c;
    --np-text-muted: #5a5a5a;
    --np-border: #d4cfc6;
    --np-font-serif: 'DM Serif Display', Georgia, serif;
    --np-font-sans: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: var(--np-font-sans);
    color: var(--np-text);
    background: var(--np-cream);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  img, svg { max-width: 100%; height: auto; }

  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
  }

  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 56px;
  }

  .logo-main {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon { width: 52px; height: 52px; flex-shrink: 0; }

  .logo-text {
    font-family: var(--np-font-serif);
    font-size: 34px;
    color: var(--np-green);
    line-height: 1.05;
    text-align: left;
  }

  .logo-text span { display: block; font-size: 30px; }

  .powered-by {
    font-size: 13px;
    color: var(--np-text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .powered-by svg { height: 14px; width: auto; flex-shrink: 0; }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--np-green);
    margin-bottom: 32px;
  }

  h1 {
    font-family: var(--np-font-serif);
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 400;
    color: var(--np-green-dark);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 16px;
    color: var(--np-text-muted);
    max-width: 420px;
    line-height: 1.65;
    margin-bottom: 40px;
  }

  .contact-line {
    font-size: 14px;
    color: var(--np-text-muted);
  }

  .contact-line a {
    color: var(--np-green);
    text-decoration: none;
  }

  .contact-line a:hover { text-decoration: underline; }

  .footer {
    background: var(--np-green-dark);
    text-align: center;
    padding: 20px 24px;
  }

  .footer p { font-size: 13px; color: rgba(255,255,255,0.5); }

  @media (max-width: 640px) {
    .logo-icon { width: 44px; height: 44px; }
    .logo-text { font-size: 28px; }
    .logo-text span { font-size: 24px; }
    .logo-block { margin-bottom: 40px; }
  }

  @media (max-width: 380px) {
    .logo-icon { width: 38px; height: 38px; }
    .logo-text { font-size: 24px; }
    .logo-text span { font-size: 20px; }
    .powered-by { font-size: 12px; }
    .powered-by svg { height: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
